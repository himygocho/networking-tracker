<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Networking Tracker</title>
</head>

<body>
    <h1>Networking Tracker</h1>
    <form action="/add" method="POST">

        <input
            type="text"
            name="name"
            placeholder="Name"
            required
        >

        <br><br>

        <input
            type="email"
            name="email"
            placeholder="Email"
        >

        <br><br>

        <input
            type="text"
            name="phone"
            placeholder="Phone Number"
        >

        <br><br>

        <textarea
            name="notes"
            placeholder="Notes">
        </textarea>

        <br><br>

        <button type="submit">
            Add Contact
        </button>

    </form>

    <h2>Contacts</h2>

<ul>
    {% for contact in contacts %}
        <li>
            {{ contact[0] }}
            -
            {{ contact[1] }}
            -
            {{ contact[2] }}
            -
            {{ contact[3] }}
        </li>
    {% endfor %}
</ul>

</body>

</html>
